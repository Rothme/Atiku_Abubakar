<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Client Login — Atiku Delivers Insights</title>
<link rel="manifest" href="/client-insights/manifest.json" />
<style>
  body { font-family:'DM Sans',system-ui,sans-serif; background:#14161a; color:#fff; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
  .box { width:340px; background:#1d2027; border-radius:14px; padding:32px; }
  h1 { font-size:20px; margin:0 0 6px; }
  p.sub { color:#9a9fab; font-size:13px; margin:0 0 20px; }
  input { width:100%; padding:12px 14px; border-radius:8px; border:1px solid #333846; background:#14161a; color:#fff; font-size:14px; margin-bottom:14px; box-sizing:border-box; }
  button { width:100%; padding:12px; border-radius:8px; border:none; background:#C41E3A; color:#fff; font-weight:700; cursor:pointer; font-size:14px; }
  .err { color:#ff8080; font-size:13px; min-height:18px; margin-bottom:8px; }
</style>
</head>
<body>
<div class="box">
  <h1>Insights Dashboard</h1>
  <p class="sub">Atiku Delivers — QR performance</p>
  <div class="err" id="err"></div>
  <input type="password" id="password" placeholder="Password" />
  <button id="submit">Sign In</button>
</div>
<script>
async function submit() {
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('err');
  errEl.textContent = '';
  const res = await fetch('/client-login', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ password })
  });
  if (res.ok) {
    window.location.href = '/client-insights/';
  } else {
    const data = await res.json().catch(() => ({}));
    errEl.textContent = data.error || 'Login failed';
  }
}
document.getElementById('submit').addEventListener('click', submit);
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
