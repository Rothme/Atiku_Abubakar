<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Scan The Plan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root { --red:#C41E3A; --ink:#14161a; --muted:#5b6068; --border:#e6e3df; }
  * { box-sizing:border-box; }
  body { font-family:'DM Sans',system-ui,sans-serif; margin:0; background:#f5f4f2; color:var(--ink); }
  header { display:flex; justify-content:space-between; align-items:center; padding:20px 32px; background:#fff; border-bottom:1px solid var(--border); }
  header h1 { font-size:18px; margin:0; }
  header a { color:var(--muted); text-decoration:none; font-size:13px; }
  main { max-width:1000px; margin:0 auto; padding:32px; }
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:32px; }
  .stat-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px; }
  .stat-card .label { color:var(--muted); font-size:13px; margin-bottom:6px; }
  .stat-card .value { font-size:32px; font-weight:700; }
  section { background:#fff; border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:24px; }
  section h2 { font-size:16px; margin:0 0 16px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:8px 6px; border-bottom:1px solid var(--border); }
  th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; }
  #qrcode { margin-bottom:16px; }
  .row { display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; }
  input { padding:10px 12px; border-radius:8px; border:1px solid var(--border); font-size:14px; width:220px; }
  button { padding:10px 18px; border-radius:8px; border:none; background:var(--ink); color:#fff; font-weight:600; cursor:pointer; font-size:14px; }
  .msg { font-size:13px; margin-top:8px; }
  .chart-bar { display:flex; align-items:flex-end; gap:3px; height:100px; }
  .chart-bar div { flex:1; background:var(--red); border-radius:2px 2px 0 0; min-height:2px; }
</style>
</head>
<body>

<header>
  <h1>Admin — Scan The Plan</h1>
  <a href="/client-insights/">View client dashboard →</a>
</header>

<main>
  <div class="stat-grid">
    <div class="stat-card"><div class="label">Total Scans</div><div class="value" id="stat-total">–</div></div>
    <div class="stat-card"><div class="label">Scans (last 7 days)</div><div class="value" id="stat-week">–</div></div>
    <div class="stat-card"><div class="label">Countries reached</div><div class="value" id="stat-countries">–</div></div>
  </div>

  <div class="row">
    <section style="flex:1; min-width:280px;">
      <h2>Master QR Code</h2>
      <div id="qrcode"></div>
      <button id="download-qr">Download QR (PNG)</button>
    </section>

    <section style="flex:1; min-width:280px;">
      <h2>Reset client dashboard password</h2>
      <input type="password" id="new-client-password" placeholder="New password (min 8 chars)" />
      <br/><br/>
      <button id="reset-password">Reset Password</button>
      <div class="msg" id="reset-msg"></div>
    </section>
  </div>

  <section>
    <h2>Scans — last 30 days</h2>
    <div class="chart-bar" id="chart"></div>
  </section>

  <section>
    <h2>Scans by country</h2>
    <table>
      <thead><tr><th>Country</th><th>Scans</th></tr></thead>
      <tbody id="country-table"></tbody>
    </table>
  </section>

  <section>
    <h2>Recent scans</h2>
    <table>
      <thead><tr><th>Time</th><th>Country</th></tr></thead>
      <tbody id="recent-table"></tbody>
    </table>
  </section>
</main>

<script>
const QR_TARGET = window.location.origin + '/track-qr';
new QRCode(document.getElementById('qrcode'), {
  text: QR_TARGET,
  width: 220,
  height: 220
});

document.getElementById('download-qr').addEventListener('click', () => {
  const img = document.querySelector('#qrcode img') || document.querySelector('#qrcode canvas');
  const link = document.createElement('a');
  link.download = 'atiku-delivers-qr.png';
  link.href = img.tagName === 'CANVAS' ? img.toDataURL('image/png') : img.src;
  link.click();
});

document.getElementById('reset-password').addEventListener('click', async () => {
  const newPassword = document.getElementById('new-client-password').value;
  const msgEl = document.getElementById('reset-msg');
  msgEl.textContent = '';
  const res = await fetch('/admin/reset-client-password', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ newPassword })
  });
  const data = await res.json().catch(() => ({}));
  if (res.ok) {
    msgEl.style.color = 'green';
    msgEl.textContent = 'Client password updated.';
    document.getElementById('new-client-password').value = '';
  } else {
    msgEl.style.color = 'crimson';
    msgEl.textContent = data.error || 'Failed to update password.';
  }
});

async function loadStats() {
  const res = await fetch('/qr-stats');
  const data = await res.json();

  document.getElementById('stat-total').textContent = data.total.toLocaleString();
  const weekTotal = data.daily.slice(-7).reduce((sum, d) => sum + d.count, 0);
  document.getElementById('stat-week').textContent = weekTotal.toLocaleString();
  document.getElementById('stat-countries').textContent = data.byCountry.length;

  const max = Math.max(1, ...data.daily.map(d => d.count));
  document.getElementById('chart').innerHTML = data.daily.map(d =>
    `<div style="height:${Math.max(2, (d.count / max) * 100)}%" title="${d.date}: ${d.count}"></div>`
  ).join('');

  document.getElementById('country-table').innerHTML = data.byCountry.map(c =>
    `<tr><td>${c.country}</td><td>${c.count}</td></tr>`
  ).join('') || '<tr><td colspan="2">No data yet</td></tr>';

  document.getElementById('recent-table').innerHTML = data.recent.map(r =>
    `<tr><td>${new Date(r.ts).toLocaleString()}</td><td>${r.country}</td></tr>`
  ).join('') || '<tr><td colspan="2">No scans yet</td></tr>';
}
loadStats();
</script>

</body>
</html>
