<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
<meta name="theme-color" content="#C41E3A" />
<title>Scan The Plan — Atiku Abubakar</title>
<meta name="description" content="Atiku Abubakar's policy plan, sector by sector and zone by zone." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --red: #C41E3A;
    --red-dark: #8f1529;
    --ink: #14161a;
    --muted: #6b6f78;
    --border: #ece7e0;
    --cream: #faf8f5;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; padding: 0; overscroll-behavior: none; }
  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 15% 0%, rgba(196,30,58,.10), transparent 55%),
      radial-gradient(circle at 100% 15%, rgba(196,30,58,.06), transparent 50%),
      var(--cream);
    max-width: 480px;
    margin: 0 auto;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  h1, h2, .brand { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.5px; }

  /* ---- Hero ---- */
  .hero {
    flex: 0 0 auto;
    position: relative;
    padding-top: var(--safe-top);
    height: 148px;
    overflow: hidden;
  }
  .hero img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display:block; }
  .hero::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(20,22,26,.10) 0%, rgba(20,22,26,.25) 55%, rgba(20,22,26,.92) 100%);
  }
  .hero-text { position: absolute; left: 16px; right: 16px; bottom: 10px; z-index: 2; color: #fff; }
  .hero-brand { font-size: 12px; letter-spacing: 2px; opacity: .85; }
  .hero-text h1 { font-size: 26px; margin: 0; line-height: 1; }

  /* ---- Content area (never scrolls on the grid screens) ---- */
  main { flex: 1 1 auto; min-height: 0; padding: 12px 14px 6px; display: flex; flex-direction: column; }
  .panel { display: none; flex: 1; min-height: 0; flex-direction: column; }
  .panel.active { display: flex; }

  .section-label {
    flex: 0 0 auto;
    font-size: 10.5px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--red); margin: 0 0 8px; padding-left: 2px;
  }

  /* ---- Tile grid ---- */
  .tile-grid {
    flex: 1 1 auto; min-height: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  #sectors .tile-grid { grid-template-rows: repeat(5, 1fr); }
  #zones .tile-grid { grid-template-rows: repeat(3, 1fr); }

  .tile {
    border: 1px solid var(--border);
    border-radius: 14px;
    background: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    cursor: pointer;
    transition: transform .1s ease;
    box-shadow: 0 1px 2px rgba(20,22,26,.04);
  }
  .tile:active { transform: scale(.96); }
  .tile .badge {
    flex: 0 0 auto;
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }
  .tile .label { font-size: 12.5px; font-weight: 700; line-height: 1.2; }

  /* ---- Detail overlay (its own screen — allowed to scroll) ---- */
  .overlay {
    position: absolute; inset: 0; z-index: 30;
    background: var(--cream);
    display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform .25s ease;
  }
  .overlay.open { transform: translateY(0); }
  .overlay-header {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 10px;
    padding: calc(var(--safe-top) + 14px) 16px 14px;
    border-bottom: 1px solid var(--border);
    background: #fff;
  }
  .overlay-header .back {
    width: 32px; height: 32px; border-radius: 50%; background: var(--cream);
    display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; flex: 0 0 auto;
  }
  .overlay-header .badge { width: 32px; height: 32px; border-radius: 9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex:0 0 auto; }
  .overlay-header h2 { font-size: 20px; margin: 0; line-height: 1.1; }
  .overlay-body { flex: 1 1 auto; overflow-y: auto; padding: 16px; }
  .overlay-body p.summary { color: var(--muted); font-size: 14px; line-height: 1.6; margin: 0 0 14px; }
  .overlay-body ul { margin: 0; padding-left: 18px; color: var(--ink); font-size: 14px; line-height: 1.7; }
  .overlay-body li { margin-bottom: 8px; }

  /* ---- Share ---- */
  #share .panel-inner { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  .share-intro { flex: 0 0 auto; text-align:center; margin-bottom:8px; }
  .share-intro h2 { font-size: 20px; margin: 0; }
  .share-intro p { color: var(--muted); font-size: 12px; margin:2px 0 0; }
  select { flex: 0 0 auto; width:100%; padding:9px 12px; border-radius:10px; border:1px solid var(--border); font-family: inherit; font-size:13px; margin-bottom:8px; background:#fff; }
  #card {
    flex: 1 1 auto; min-height: 0; width: 100%; border-radius: 18px; overflow:hidden; position: relative;
    background: linear-gradient(160deg, var(--red), var(--red-dark)); color:#fff;
    margin-bottom:8px; display:flex; flex-direction:column;
  }
  #card .card-photo { flex: 1; min-height: 0; position: relative; overflow: hidden; }
  #card .card-photo img { width:100%; height:100%; object-fit:cover; display:block; }
  #card .card-photo::after { content:''; position:absolute; inset:0; background: linear-gradient(180deg, rgba(196,30,58,0) 40%, var(--red-dark) 100%); }
  #card .card-text { flex: 0 0 auto; padding: 14px 18px 18px; }
  #card .card-brand { font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:2px; opacity:.85; }
  #card h3 { font-size: 19px; margin:6px 0 4px; line-height:1.05; }
  #card p { font-size: 12px; opacity:.92; line-height:1.4; margin:0; }
  #card .tag { display:inline-block; margin-top:10px; font-size:10px; background:rgba(255,255,255,.18); padding:5px 10px; border-radius:999px; font-weight:600; }
  .btn { flex: 0 0 auto; display:block; width:100%; padding:12px; border-radius:12px; font-weight:700; text-decoration:none; font-size:13.5px; border:none; background: var(--ink); color:#fff; cursor:pointer; }

  /* ---- Bottom nav ---- */
  .bottom-nav {
    flex: 0 0 auto;
    background: #fff; border-top: 1px solid var(--border);
    display:flex; padding: 6px 8px calc(6px + var(--safe-bottom));
  }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding: 5px 4px; border-radius:12px; cursor:pointer; color: var(--muted); }
  .nav-item.active { color: var(--red); }
  .nav-item .icon { font-size: 18px; line-height:1; }
  .nav-item .label { font-size: 10px; font-weight: 700; letter-spacing: .3px; }
</style>
</head>
<body>

<div class="hero">
  <img src="/assets/images/atiku-running-mate.jpg" alt="Atiku Abubakar" />
  <div class="hero-text">
    <div class="hero-brand">SCAN THE PLAN</div>
    <h1>THE PLAN.</h1>
  </div>
</div>

<main>
  <div id="sectors" class="panel active">
    <div class="section-label">10 Sectors — tap one</div>
    <div class="tile-grid" id="sector-grid"></div>
  </div>

  <div id="zones" class="panel">
    <div class="section-label">6 Geopolitical Zones — tap one</div>
    <div class="tile-grid" id="zone-grid"></div>
  </div>

  <div id="share" class="panel">
    <div class="panel-inner">
      <div class="share-intro">
        <h2>Share This Plan</h2>
        <p>Pick a sector and download a card.</p>
      </div>
      <select id="card-sector-select"></select>
      <div id="card">
        <div class="card-photo"><img src="/assets/images/atiku-portrait.webp" alt="" /></div>
        <div class="card-text">
          <div class="card-brand">SCAN THE PLAN</div>
          <h3 id="card-title">Economy &amp; Jobs</h3>
          <p id="card-desc">Diversification, MSMEs, and a national job creation agenda.</p>
          <div class="tag">Get Nigeria Working Again</div>
        </div>
      </div>
      <button class="btn" id="download-card">Download Card</button>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <div class="nav-item active" data-panel="sectors">
    <div class="icon">&#9783;</div>
    <div class="label">Sectors</div>
  </div>
  <div class="nav-item" data-panel="zones">
    <div class="icon">&#128205;</div>
    <div class="label">Zones</div>
  </div>
  <div class="nav-item" data-panel="share">
    <div class="icon">&#8599;</div>
    <div class="label">Share</div>
  </div>
</nav>

<div class="overlay" id="detail-overlay">
  <div class="overlay-header">
    <div class="back" id="overlay-back">&#8592;</div>
    <div class="badge" id="overlay-badge"></div>
    <h2 id="overlay-title"></h2>
  </div>
  <div class="overlay-body">
    <p class="summary" id="overlay-summary"></p>
    <ul id="overlay-list"></ul>
  </div>
</div>

<script>
const palette = ['#C41E3A','#1D4E89','#1B7A5A','#B8860B','#6A3D9A','#2E7D32','#8A5A2B','#0E7C9D','#5B6B00','#C2410C'];

const sectors = [
  { icon: "💰", title: "Economy & Jobs", summary: "A plan to diversify Nigeria's economy beyond oil, strengthen agriculture and manufacturing, and back small businesses.",
    points: [
      "Grow non-oil sectors — agriculture, manufacturing, and MSMEs — as the main engines of new jobs.",
      "Launch a national entrepreneurship and job creation programme targeting millions of new opportunities annually.",
      "Expand apprenticeship and vocational training pathways for young people, including those without formal schooling.",
      "Attract private investment through public-private partnerships and reformed capital markets."
    ]},
  { icon: "🏗️", title: "Infrastructure", summary: "Closing Nigeria's infrastructure gap across transport, power, technology, and housing.",
    points: [
      "Set up a dedicated infrastructure development unit to fast-track major projects.",
      "Mobilize private and pension-fund capital through a new infrastructure debt fund.",
      "Push forward power sector reform to expand reliable electricity access.",
      "Support the digitization of government operations and the wider tech ecosystem."
    ]},
  { icon: "🎓", title: "Human Capital", summary: "Investing in education and health as the foundation for long-term national development.",
    points: [
      "Prioritize technical and vocational education aligned with the modern job market.",
      "Expand access to quality, industry-relevant education nationwide.",
      "Strengthen healthcare delivery systems and public health investment."
    ]},
  { icon: "🌱", title: "Youth & Women", summary: "Targeted programmes to expand opportunity for young people and women.",
    points: [
      "Scale up skills-acquisition and micro-enterprise support programmes.",
      "Improve access to finance and training tailored to youth and women-led businesses.",
      "Strengthen institutional support structures for empowerment initiatives."
    ]},
  { icon: "⚖️", title: "Anti-Corruption", summary: "A detect-sanction-strengthen approach to institutional integrity.",
    points: [
      "Deploy technology across government agencies to improve transparency.",
      "Grant anti-corruption agencies financial independence and operational autonomy.",
      "Fast-track outstanding corruption cases through dedicated tribunals.",
      "Integrate national databases to improve financial crime detection."
    ]},
  { icon: "🛡️", title: "National Security", summary: "A restructured, better-coordinated approach to Nigeria's security architecture.",
    points: [
      "Improve coordination and information-sharing across security agencies.",
      "Invest in modern security technology and equipment.",
      "Pursue diplomacy, improved border control, and community-level conflict resolution.",
      "Begin a gradual, structured move toward state policing."
    ]},
  { icon: "🏛️", title: "Governance", summary: "Structural reform aimed at giving Nigeria's regions greater autonomy and voice.",
    points: [
      "Pursue a restructuring agenda that strengthens federating units.",
      "Reinforce the independence of the legislature and judiciary.",
      "Promote cooperation and consensus across Nigeria's diverse regions."
    ]},
  { icon: "🌍", title: "Int'l Relations", summary: "Restoring Nigeria's leadership role in regional and global affairs.",
    points: [
      "Take a more active leadership role within ECOWAS and the African Union.",
      "Strengthen diaspora engagement and channel remittances toward national development.",
      "Pursue trade diversification and stronger multilateral partnerships."
    ]},
  { icon: "🌳", title: "Environment", summary: "Protecting Nigeria's most environmentally vulnerable regions.",
    points: [
      "Address Niger Delta pollution and environmental degradation.",
      "Tackle desert encroachment and erosion in affected states.",
      "Balance economic development with long-term environmental protection."
    ]},
  { icon: "🎭", title: "Culture & Sports", summary: "Backing Nigeria's creative economy as a driver of jobs and soft power.",
    points: [
      "Provide financial and regulatory support tailored to the entertainment industry.",
      "Strengthen anti-piracy enforcement and intellectual property protections.",
      "Promote tourism and cultural heritage as economic assets."
    ]}
];

const zones = [
  { icon: "🧭", title: "North Central", summary: "Priorities for the middle belt.",
    points: ["Resolve farmer–herder tensions through structured conflict-resolution mechanisms.", "Expand agricultural investment across the zone.", "Improve security coordination across the middle belt."] },
  { icon: "🔥", title: "North East", summary: "Post-insurgency recovery priorities.",
    points: ["Restructured and better-resourced security operations.", "Rebuild infrastructure in affected communities.", "Invest in human capital recovery programmes."] },
  { icon: "🌾", title: "North West", summary: "Security and skills priorities.",
    points: ["Tackle rural banditry and insecurity.", "Expand technical and vocational education.", "Strengthen agricultural value chains."] },
  { icon: "🌴", title: "South East", summary: "Enterprise and inclusion priorities.",
    points: ["Support MSMEs and entrepreneurship.", "Invest in regional infrastructure.", "Strengthen inclusion in national governance and economic planning."] },
  { icon: "🛢️", title: "South South", summary: "Environmental and economic priorities.",
    points: ["Niger Delta environmental remediation.", "Diversify the region's oil-dependent economy.", "Invest in regional infrastructure."] },
  { icon: "💡", title: "South West", summary: "Technology and industry priorities.",
    points: ["Grow technology and innovation hubs.", "Support industrial growth.", "Invest in manufacturing and services base."] }
];

function renderGrid(containerId, items) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map((it, i) => `
    <div class="tile" data-i="${i}">
      <div class="badge" style="background:${palette[i % palette.length]}22; color:${palette[i % palette.length]}">${it.icon}</div>
      <div class="label">${it.title}</div>
    </div>
  `).join('');
}
renderGrid('sector-grid', sectors);
renderGrid('zone-grid', zones);

const overlay = document.getElementById('detail-overlay');
const overlayBadge = document.getElementById('overlay-badge');
const overlayTitle = document.getElementById('overlay-title');
const overlaySummary = document.getElementById('overlay-summary');
const overlayList = document.getElementById('overlay-list');

function openDetail(item, colorIndex) {
  overlayBadge.style.background = palette[colorIndex % palette.length] + '22';
  overlayBadge.style.color = palette[colorIndex % palette.length];
  overlayBadge.textContent = item.icon;
  overlayTitle.textContent = item.title;
  overlaySummary.textContent = item.summary;
  overlayList.innerHTML = item.points.map(p => `<li>${p}</li>`).join('');
  overlay.classList.add('open');
}
document.getElementById('overlay-back').addEventListener('click', () => overlay.classList.remove('open'));

document.getElementById('sector-grid').addEventListener('click', e => {
  const tile = e.target.closest('.tile');
  if (tile) openDetail(sectors[tile.dataset.i], +tile.dataset.i);
});
document.getElementById('zone-grid').addEventListener('click', e => {
  const tile = e.target.closest('.tile');
  if (tile) openDetail(zones[tile.dataset.i], +tile.dataset.i);
});

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    item.classList.add('active');
    document.getElementById(item.dataset.panel).classList.add('active');
    overlay.classList.remove('open');
  });
});

const cardSelect = document.getElementById('card-sector-select');
cardSelect.innerHTML = sectors.map((s,i) => `<option value="${i}">${s.title}</option>`).join('');
function renderCard(i) {
  document.getElementById('card-title').textContent = sectors[i].title;
  document.getElementById('card-desc').textContent = sectors[i].summary;
}
renderCard(0);
cardSelect.addEventListener('change', e => renderCard(e.target.value));

document.getElementById('download-card').addEventListener('click', () => {
  html2canvas(document.getElementById('card'), { useCORS: true }).then(canvas => {
    const link = document.createElement('a');
    link.download = 'scan-the-plan-card.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
});
</script>

</body>
</html>
